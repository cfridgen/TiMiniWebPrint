services:
  timiniprint:
    # Development channel image (moves with new development builds)
    image: ghcr.io/cfridgen/timiniwebprint:dev-latest
    restart: unless-stopped
    privileged: true
    network_mode: host
    environment:
      # Bluetooth / DBus
      DBUS_SYSTEM_BUS_ADDRESS: "unix:path=/run/dbus/system_bus_socket"
      # Development channel default port
      APP_PORT: "8901"
      # Disabled by default to avoid conflicts when release and dev run in parallel
      NODE_EXPORTER_ENABLED: "0"
      NODE_EXPORTER_ARGS: "--collector.disable-defaults --collector.cpu --collector.meminfo --collector.filesystem"
    volumes:
      # Share host DBus so bluetoothctl / bleak can reach host bluetoothd
      - /run/dbus:/run/dbus
      - /var/run/dbus:/var/run/dbus
      # Optional but useful for BlueZ adapter visibility in some setups
      - /run/udev:/run/udev:ro
    security_opt:
      - seccomp=unconfined  # allow AF_BLUETOOTH RFCOMM sockets in container
