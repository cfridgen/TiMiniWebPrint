services:
  timiniprint:
    image: ghcr.io/cfridgen/timiniwebprint:latest
    pull_policy: always
    restart: unless-stopped
    privileged: true
    ports:
      - "8001:8000"
    environment:
      # Bluetooth / DBus
      DBUS_SYSTEM_BUS_ADDRESS: "unix:path=/run/dbus/system_bus_socket"
      # node_exporter (set to 0 to disable)
      NODE_EXPORTER_ENABLED: "1"
      NODE_EXPORTER_ARGS: "--collector.disable-defaults --collector.cpu --collector.meminfo --collector.filesystem"
    volumes:
      # Share host DBus so bluetoothctl / bleak can reach host bluetoothd
      - /run/dbus:/run/dbus
      - /var/run/dbus:/var/run/dbus
      # Optional but useful for BlueZ adapter visibility in some setups
      - /run/udev:/run/udev:ro
    cap_add:
      - NET_ADMIN   # needed for BLE socket creation
      - NET_RAW     # needed for BLE/Bluetooth raw sockets
    security_opt:
      - seccomp=unconfined  # allow AF_BLUETOOTH RFCOMM sockets in container
