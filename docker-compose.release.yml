services:
  timiniprint:
    # Release channel image is pinned on purpose.
    # Update this tag only on explicit release deploy requests.
    image: ghcr.io/cfridgen/timiniwebprint:v1.0.0
    restart: unless-stopped
    privileged: true
    network_mode: host
    environment:
      # Bluetooth / DBus
      DBUS_SYSTEM_BUS_ADDRESS: "unix:path=/run/dbus/system_bus_socket"
      # Release channel port
      APP_PORT: "8001"
      # Release keeps exporter enabled
      NODE_EXPORTER_ENABLED: "1"
      # Release version label
      APP_VERSION: "1.0.0"
      NODE_EXPORTER_ARGS: "--collector.disable-defaults --collector.cpu --collector.meminfo --collector.filesystem"
    volumes:
      # Share host DBus so bluetoothctl / bleak can reach host bluetoothd
      - /run/dbus:/run/dbus
      - /var/run/dbus:/var/run/dbus
      # Optional but useful for BlueZ adapter visibility in some setups
      - /run/udev:/run/udev:ro
    security_opt:
      - seccomp=unconfined  # allow AF_BLUETOOTH RFCOMM sockets in container
